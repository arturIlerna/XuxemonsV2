services:
  # Base de Datos (MySQL)
  db:
    image: mysql:8.0
    container_name: xuxe-db
    restart: always
    environment:
      MYSQL_DATABASE: xuxedex_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - xuxe-network

  # Backend (Laravel)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xuxe-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - xuxe-network
    command: php artisan serve --host=0.0.0.0 --port=8000

  # Frontend (Angular) - CORREGIDO
  frontend:
    image: node:20
    container_name: xuxe-frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "4201:4201"
    volumes:
      - ./frontend:/app
    networks:
      - xuxe-network
    command: >
      sh -c "
        if [ ! -d node_modules ]; then
          echo 'Instalando dependencias...' &&
          npm install
        fi &&
        echo 'Iniciando servidor Angular...' &&
        npx ng serve --host 0.0.0.0 --port 4201
      "

# Red y volúmenes
networks:
  xuxe-network:
    driver: bridge

volumes:
  db_data: