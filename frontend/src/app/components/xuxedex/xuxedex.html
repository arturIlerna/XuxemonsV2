<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/dashboard" class="nav-brand">Xuxemons</a>
    <ul class="nav-menu">
      <li><a routerLink="/xuxedex" routerLinkActive="active">Xuxedex</a></li>
      <li><a routerLink="/inventory" routerLinkActive="active">Motxilla</a></li>
    </ul>
    <div class="nav-user">
      <span>{{ userName }}</span>
      <button (click)="logout()" class="btn-logout">Cerrar sesión</button>
    </div>
  </div>
</nav>

<main>
  <header class="page-header">
    <h1>Mi Xuxedex</h1>
    <p class="total-count">Total Xuxemons: {{ allXuxemons.length }}</p>
  </header>
  @if (isAdmin) {
    <section class="admin-panel" aria-label="Panel de administración">
      <h2>Panel de Administración</h2>
      
      <div class="admin-controls">
        <label for="userSelect">Seleccionar usuario:</label>
        <select 
          id="userSelect"
          [(ngModel)]="selectedUserId"
          (change)="loadUserXuxemons()"
        >
          <option value="">-- Selecciona un usuario --</option>
          @for (user of users; track user.id) {
            <option [value]="user.id">
              {{ user.name }} ({{ user.email }})
            </option>
          }
        </select>

        <button 
          (click)="addRandomXuxemonToSelectedUser()"
          [disabled]="!selectedUserId"
          class="btn-admin"
        >
          + Añadir Xuxemon Aleatorio
        </button>
      </div>
    </section>
  }
   <section class="filters-section" aria-label="Filtros de Xuxemons">
    <h2 class="sr-only">Filtros disponibles</h2>

      <div class="search-box">
      <label for="searchXuxemon" class="sr-only">Buscar por nombre</label>
      <input 
        id="searchXuxemon"
        type="text" 
        placeholder="Buscar Xuxemon por nombre..."
        [(ngModel)]="searchTerm"
        (input)="filterXuxemons()"
        aria-label="Buscar Xuxemon por nombre"
      >
    </div>
    <fieldset class="filter-group">
      <legend>Filtrar por tipo:</legend>
      <div class="filter-buttons">
        @for (type of ['todos', 'Agua', 'Tierra', 'Aire']; track type) {
          <button 
            [class.active]="selectedType === type"
            (click)="filterByType(type)"
            [attr.aria-pressed]="selectedType === type"
          >
            {{ type === 'todos' ? 'Todos' : type }}
          </button>
        }
      </div>
    </fieldset>
